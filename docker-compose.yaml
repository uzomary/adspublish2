version: '3.8'

services:
  ads-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ads-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:uzomary_adstracking@host.docker.internal:5432/adstracking
      - DATABASE_SSL=false
      - JWT_SECRET=adtrack_vps_production_secret_2024
      - NEXT_PUBLIC_TRACKER_URL=https://track.stakerschoiceads.com
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: ads-network
